name: CI

on:
  push:
    branches:
      - main
      - "copilot/**"
  pull_request:

jobs:
  go:
    name: Go test and build
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.19.x"
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
